name: install-boundary

on:
  pull_request:
  push:
    branches: [main]

jobs:
  install-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check installable skill boundary
        run: python3 scripts/check_install_boundary.py
