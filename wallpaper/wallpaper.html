<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>wallpaper</title>
<style>
  :root {
    --stone-50:  #fafaf9;
    --stone-100: #f5f5f4;
    --stone-200: #e7e5e4;
    --stone-300: #d6d3d1;
    --stone-700: #44403c;
    --stone-900: #1c1917;
    --stone-950: #0c0a09;
    --red:       #C8102E;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 2880px;
    height: 1800px;
    overflow: hidden;
    background: var(--stone-50);
  }
  .stage {
    position: relative;
    width: 2880px;
    height: 1800px;
    overflow: hidden;
  }

  /* faint 12-col grid lines — the grid you break */
  .grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    pointer-events: none;
    z-index: 1;
  }
  .grid > div {
    border-right: 1px solid rgba(28,25,23,0.05);
  }
  .grid > div:last-child { border-right: none; }

  /* horizontal hairlines */
  .hair {
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(28,25,23,0.06);
    z-index: 1;
  }

  /* the enormous red circle, bleeding off the right edge */
  .circle {
    position: absolute;
    top: -260px;
    right: -520px;
    width: 2200px;
    height: 2200px;
    border-radius: 50%;
    background: var(--red);
    z-index: 10;
  }

  /* black bar running vertically, breaking the grid, overlapping the circle */
  .bar {
    position: absolute;
    top: -80px;
    left: 1280px;
    width: 240px;
    height: 1960px;
    background: var(--stone-950);
    z-index: 20;
  }

  /* small inset window — negative space inside the bar */
  .inset {
    position: absolute;
    top: 980px;
    left: 1320px;
    width: 160px;
    height: 160px;
    background: var(--stone-50);
    z-index: 30;
  }

  /* a single thin red diagonal — diagonal energy */
  .diagonal {
    position: absolute;
    top: 1240px;
    left: -200px;
    width: 1700px;
    height: 6px;
    background: var(--red);
    transform: rotate(-4deg);
    transform-origin: left center;
    z-index: 15;
  }

  /* lower-left composition anchor: three precise squares */
  .anchor {
    position: absolute;
    left: 220px;
    bottom: 220px;
    display: flex;
    gap: 28px;
    z-index: 12;
  }
  .anchor span {
    display: block;
    width: 56px;
    height: 56px;
    background: var(--stone-900);
  }
  .anchor span.red { background: var(--red); }

</style>
</head>
<body>
  <div class="stage">
    <div class="grid">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>

    <div class="hair" style="top: 220px;"></div>
    <div class="hair" style="top: 1580px;"></div>

    <div class="circle"></div>
    <div class="bar"></div>
    <div class="inset"></div>
    <div class="diagonal"></div>

    <div class="anchor">
      <span></span>
      <span class="red"></span>
      <span></span>
    </div>
  </div>
</body>
</html>
