<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snow Line Express</title>
<style>
  :root{
    --paper:#f5f2ea;
    --ink:#1c1917;
    --soft:#d8d0c3;
    --blue:#2f6f9f;
    --blue-deep:#17445f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#cfc8bc}
  body{
    min-height:100vh;
    display:grid;
    place-items:center;
    font-family:"Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    color:var(--ink);
  }
  .poster{
    position:relative;
    width:1200px;
    height:840px;
    overflow:hidden;
    background:var(--paper);
    isolation:isolate;
    box-shadow:0 24px 70px rgba(28,25,23,.22);
  }
  .grid{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:repeat(8,1fr);
    gap:0;
    z-index:5;
  }
  .sky{
    position:absolute;
    inset:0;
    background:
      linear-gradient(90deg, rgba(245,242,234,.96) 0 34%, rgba(245,242,234,.2) 34% 100%),
      linear-gradient(180deg, rgba(47,111,159,.18), transparent 58%);
    z-index:2;
  }
  .photo{
    position:absolute;
    right:-56px;
    top:0;
    width:820px;
    height:840px;
    overflow:hidden;
    clip-path:polygon(17% 0,100% 0,100% 100%,0 100%);
    z-index:1;
    background:var(--blue-deep);
  }
  .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:grayscale(1) contrast(1.28) brightness(1.08);
    mix-blend-mode:multiply;
    opacity:.82;
  }
  .photo:after{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(245,242,234,.18) 0 1px, transparent 1px 5px),
      linear-gradient(90deg, rgba(47,111,159,.86), rgba(245,242,234,.08) 58%, rgba(28,25,23,.18));
    mix-blend-mode:multiply;
  }
  .mountain{
    position:absolute;
    right:188px;
    top:88px;
    width:610px;
    height:520px;
    background:var(--paper);
    clip-path:polygon(8% 88%,31% 36%,45% 56%,59% 18%,92% 88%);
    opacity:.92;
    z-index:3;
    mix-blend-mode:screen;
  }
  .mountain.two{
    right:20px;
    top:170px;
    width:580px;
    height:460px;
    opacity:.45;
    transform:scaleX(-1);
  }
  .rail{
    position:absolute;
    left:-70px;
    bottom:92px;
    width:1380px;
    height:172px;
    z-index:8;
    transform:skewY(-7deg);
    pointer-events:none;
  }
  .rail .bed{
    position:absolute;
    left:0;
    top:72px;
    width:100%;
    height:30px;
    background:var(--ink);
  }
  .rail .snowline{
    position:absolute;
    left:0;
    top:44px;
    width:100%;
    height:22px;
    background:var(--paper);
    border-top:8px solid var(--blue);
  }
  .rail .ties{
    position:absolute;
    left:110px;
    top:26px;
    width:1060px;
    height:118px;
    background:repeating-linear-gradient(90deg, transparent 0 38px, rgba(28,25,23,.9) 38px 48px, transparent 48px 86px);
    opacity:.9;
  }
  .ascent{
    position:absolute;
    right:-22px;
    bottom:-10px;
    font-size:365px;
    line-height:.78;
    font-weight:800;
    letter-spacing:-.09em;
    color:rgba(47,111,159,.20);
    z-index:4;
    pointer-events:none;
    user-select:none;
  }
  .title{
    grid-column:1 / 7;
    grid-row:1 / 5;
    align-self:start;
    padding:58px 0 0 62px;
    z-index:30;
  }
  h1{
    margin:0;
    font-size:108px;
    line-height:.86;
    letter-spacing:-.065em;
    font-weight:800;
    max-width:520px;
  }
  .rule{
    width:342px;
    height:18px;
    background:var(--blue);
    margin:34px 0 0 4px;
  }
  .facts{
    grid-column:1 / 5;
    grid-row:5 / 8;
    align-self:end;
    padding:0 0 94px 64px;
    z-index:31;
  }
  .facts .route{
    font-size:30px;
    line-height:1;
    font-weight:700;
    letter-spacing:-.02em;
    margin-bottom:18px;
  }
  .facts .time{
    font-size:82px;
    line-height:.9;
    font-weight:200;
    letter-spacing:-.06em;
    margin-bottom:14px;
  }
  .facts .body{
    font-size:22px;
    line-height:1.05;
    font-weight:500;
    letter-spacing:-.025em;
  }
  .cta{
    position:absolute;
    left:638px;
    bottom:62px;
    z-index:40;
    background:var(--ink);
    color:var(--paper);
    padding:20px 26px 22px 24px;
    font-size:34px;
    line-height:.95;
    font-weight:700;
    letter-spacing:-.045em;
    min-width:360px;
  }
  .micro{
    position:absolute;
    z-index:20;
    font-size:11px;
    line-height:1.15;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-weight:700;
    color:rgba(28,25,23,.58);
  }
  .m1{left:66px;top:34px}
  .m2{left:520px;top:62px;writing-mode:vertical-rl}
  .m3{right:62px;top:54px;color:rgba(245,242,234,.72)}
  .m4{right:76px;bottom:210px;color:rgba(245,242,234,.74)}
  .station{
    position:absolute;
    left:406px;
    bottom:188px;
    z-index:18;
    width:14px;
    height:14px;
    background:var(--blue);
    outline:8px solid var(--paper);
  }
  .station.b{left:824px;bottom:242px}
  .grain{
    position:absolute;
    inset:0;
    z-index:50;
    pointer-events:none;
    opacity:.18;
    background-image:
      repeating-radial-gradient(circle at 20% 30%, rgba(28,25,23,.16) 0 1px, transparent 1px 4px);
    mix-blend-mode:multiply;
  }
</style>
</head>
<body>
  <main class="poster" data-lineage="travel-photomontage" data-reference="matter-style-crop" data-print-process="lithographic-overprint">
    <div class="photo" data-image-role="place">
      <img src="snow-rail.jpg" alt="">
    </div>
    <div class="sky"></div>
    <div class="mountain" aria-hidden="true"></div>
    <div class="mountain two" aria-hidden="true"></div>
    <div class="ascent" aria-hidden="true">07</div>
    <div class="micro m1">Chur / Winter departure</div>
    <div class="micro m2">Albula approach / snow grade</div>
    <div class="micro m3">Arosa line</div>
    <div class="micro m4">First ascent service</div>
    <div class="station" aria-hidden="true"></div>
    <div class="station b" aria-hidden="true"></div>
    <div class="rail" aria-hidden="true">
      <div class="ties"></div>
      <div class="snowline"></div>
      <div class="bed"></div>
    </div>
    <section class="grid">
      <div class="title">
        <h1 data-critical="title">Snow Line Express</h1>
        <div class="rule" aria-hidden="true"></div>
      </div>
      <div class="facts" data-critical="date">
        <div class="route">Chur → Arosa</div>
        <div class="time">07:12</div>
        <div class="body" data-critical="body">first train<br>winter rail</div>
      </div>
    </section>
    <div class="cta" data-critical="cta">Take the first ascent.</div>
    <div class="grain" aria-hidden="true"></div>
  </main>
</body>
</html>
