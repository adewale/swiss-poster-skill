<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flue — The Agent Harness Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=IBM+Plex+Serif:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-50:  #fafaf9;
    --stone-100: #f5f5f4;
    --stone-200: #e7e5e4;
    --stone-300: #d6d3d1;
    --stone-400: #a8a29e;
    --stone-500: #78716c;
    --stone-700: #44403c;
    --stone-900: #1c1917;
    --stone-950: #0c0a09;
    --blue:      #007AFF;
    --blue-2:    #0057D8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1260px;
    height: 1800px;
    background: var(--stone-50);
    color: var(--stone-900);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .poster {
    position: relative;
    width: 1260px;
    height: 1800px;
    overflow: hidden;
    padding: 42px 64px 30px 64px;
  }

  /* corner brackets */
  .corner {
    position: absolute;
    width: 22px; height: 22px;
    border: 2px solid var(--stone-900);
    z-index: 6;
  }
  .corner.tl { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }

  /* topbar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--stone-900);
    position: relative;
    z-index: 4;
  }
  .topbar .meta { color: var(--stone-500); margin-top: 4px; font-weight: 400; }
  .topbar .right { text-align: right; }

  /* Flue glyph mark, rebuilt from the favicon grid */
  .mark {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    background: var(--blue);
    flex: 0 0 auto;
  }
  .mark i { background: var(--stone-50); display: block; }

  /* ── The composition: an invisible grid, mostly empty ─────────────── */

  /* small quiet title, upper-left of the field */
  .titleblock {
    position: absolute;
    left: 64px;
    top: 250px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .titleblock .mark { width: 46px; height: 46px; }
  .titleblock .word {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--stone-900);
  }

  /* the single one-line definition, set quietly below the title */
  .definition {
    position: absolute;
    left: 64px;
    top: 360px;
    z-index: 4;
    max-width: 30ch;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 25px;
    line-height: 1.42;
    letter-spacing: -0.005em;
    color: var(--stone-700);
  }
  .definition b { font-weight: 600; color: var(--stone-900); }

  /* the anchor: the three words on an exact baseline, lower third */
  .loop {
    position: absolute;
    left: 64px;
    bottom: 360px;
    z-index: 4;
  }
  .loop .kicker {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--stone-500);
    margin-bottom: 40px;
  }
  .loop .words {
    display: flex;
    align-items: baseline;
    gap: 92px;
  }
  .loop .words span {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--stone-900);
  }

  /* the single graphic: one small blue square, placed with intent */
  .square {
    position: absolute;
    width: 38px;
    height: 38px;
    background: var(--blue);
    z-index: 3;
  }

  /* one thin line, the only other graphic — a quiet rule under the words */
  .rule {
    position: absolute;
    left: 64px;
    bottom: 322px;
    width: 540px;
    height: 1px;
    background: var(--stone-300);
    z-index: 3;
  }

  /* small microtype label set against the right margin */
  .sidelabel {
    position: absolute;
    right: 64px;
    bottom: 360px;
    z-index: 4;
    text-align: right;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--stone-500);
    line-height: 2.2;
  }

  /* colophon */
  .colophon {
    position: absolute;
    left: 64px; right: 64px;
    bottom: 26px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone-500);
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--stone-300);
    padding-top: 9px;
    z-index: 4;
  }
  .colophon b { color: var(--stone-900); font-weight: 700; }
</style>
</head>
<body>
<div class="poster">

  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div>Flue · The Agent Harness Framework</div>
      <div class="meta">agent = model + harness</div>
    </div>
    <div class="right">
      <div>withastro / flue</div>
      <div class="meta">a task, not a script</div>
    </div>
  </div>

  <!-- TITLE — small, quiet -->
  <div class="titleblock">
    <span class="mark">
      <i style="grid-column:4;grid-row:2"></i>
      <i style="grid-column:3;grid-row:3"></i>
      <i style="grid-column:4;grid-row:4"></i>
      <i style="grid-column:3;grid-row:5"></i>
    </span>
    <span class="word">Flue</span>
  </div>

  <!-- ONE-LINE DEFINITION -->
  <p class="definition">
    The model reasons; the harness gives it a loop. You give it
    <b>a task, not a script.</b>
  </p>

  <!-- THE SINGLE GRAPHIC — one small blue square on the grid -->
  <span class="square" style="left:608px; top:520px;"></span>

  <!-- THE ANCHOR — three words, exact spacing, lower third -->
  <div class="loop">
    <div class="kicker">The loop</div>
    <div class="words">
      <span>Reason</span>
      <span>Act</span>
      <span>Observe</span>
    </div>
  </div>

  <!-- the only line -->
  <span class="rule"></span>

  <!-- microtype against the right margin -->
  <div class="sidelabel">
    Model<br>
    +<br>
    Harness
  </div>

  <!-- COLOPHON -->
  <div class="colophon">
    <div>The Agent Harness Framework</div>
    <div>withastro / <b>Flue</b></div>
  </div>

</div>
</body>
</html>
