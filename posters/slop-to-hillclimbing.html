<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Slop → Hillclimbing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,400;0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAFAF9;
    --ink:   #1C1917;
    --ink-4: rgba(28,25,23,0.40);
    --red:   #C8102E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1800px;
    height: 1260px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .poster {
    position: relative;
    width: 1800px;
    height: 1260px;
    overflow: hidden;
    background: var(--paper);
  }

  /* The function definition runs along the page diagonal,
     top-left to bottom-right.
     diagonal angle = atan(1260 / 1800) ≈ 35deg */
  .diag {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(35deg);
    transform-origin: center center;
    white-space: nowrap;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 700;
    font-size: 164px;
    letter-spacing: -0.045em;
    line-height: 1;
    color: var(--ink);
  }
  .diag .name   { font-style: italic; }
  .diag .colon  { font-weight: 100; color: var(--ink-4); margin: 0 0.18em; }
  .diag .arrow  { font-weight: 100; margin: 0 0.18em; }
  .diag .out    { color: var(--red); }
</style>
</head>
<body>
<div class="poster">
  <div class="diag"><span class="name">elevate</span><span class="colon">:</span>Slop<span class="arrow">&rarr;</span><span class="out">Hillclimbing</span></div>
</div>
</body>
</html>
