<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cynefin — The Compass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-50:  #fafaf9;
    --stone-100: #f5f5f4;
    --stone-200: #e7e5e4;
    --stone-300: #d6d3d1;
    --stone-400: #a8a29e;
    --stone-500: #78716c;
    --stone-700: #44403c;
    --stone-900: #1c1917;
    --stone-950: #0f0d0c;
    --red:   #C8102E;   /* single accent — the needle / one mark */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1260px; height: 1800px;
    background: var(--stone-50); color: var(--stone-900);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  .poster { position: relative; width: 1260px; height: 1800px; overflow: hidden; padding: 44px 60px 28px 60px; }

  .corner { position: absolute; width: 20px; height: 20px; border: 2px solid var(--stone-900); z-index: 9; }
  .corner.tl { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }

  .topbar {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; font-weight: 500; color: var(--stone-900);
  }
  .topbar .meta { color: var(--stone-500); margin-top: 4px; font-weight: 400; }
  .topbar .right { text-align: right; }
  .topbar .right .meta { text-transform: none; letter-spacing: 0.08em; }

  /* THE OBJECT — one compass, centred, hero scale */
  .stage {
    position: absolute; left: 0; right: 0; top: 172px;
    display: flex; justify-content: center;
    pointer-events: none;
  }
  .compass { width: 800px; height: 800px; display: block; overflow: visible; }

  /* type baked into the compass face stays as SVG text; HTML copy lives below */

  /* TITLE + body block under the object */
  .legend {
    position: absolute; left: 60px; right: 60px; top: 1160px;
    text-align: center;
  }
  .legend .title {
    font-weight: 700; font-size: 96px; line-height: 0.85; letter-spacing: -0.038em;
    color: var(--stone-900);
  }
  .legend .body {
    margin: 32px auto 0; max-width: 720px;
    font-size: 20px; line-height: 1.48; font-weight: 400; color: var(--stone-700);
    letter-spacing: -0.005em;
  }

  .colophon {
    position: absolute; left: 60px; right: 60px; bottom: 26px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--stone-500); display: flex; justify-content: space-between;
    border-top: 1px solid var(--stone-300); padding-top: 9px;
  }
  .colophon b { color: var(--stone-900); font-weight: 700; }
</style>
</head>
<body>
<div class="poster"
     data-lineage="sachplakat-object"
     data-genre="object-poster"
     data-reference="odermatt-tissi-commercial-clarity"
     data-encoding="four domains → four cardinal points · disorder → needle hub · red needle → you are unsure which way">

  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>

  <div class="topbar">
    <div>
      <div>Cynefin</div>
      <div class="meta" data-source="creator">Dave Snowden · 1999</div>
    </div>
    <div class="right">
      <div>an instrument for deciding how to decide</div>
      <div class="meta" data-source="pronunciation">/kəˈnɛvɪn/</div>
    </div>
  </div>

  <!-- THE OBJECT: a compass for not-knowing -->
  <div class="stage">
    <svg class="compass" viewBox="0 0 700 700" data-source="compass" role="img"
         aria-label="A compass. Four cardinal points name the four Cynefin domains; the centre hub is Disorder; the red needle points off-centre.">

      <!-- ticks + ring are decorative -->
      <g aria-hidden="true">
        <!-- outer ring -->
        <circle cx="350" cy="350" r="332" fill="none" stroke="#1c1917" stroke-width="2.5"/>
        <circle cx="350" cy="350" r="300" fill="none" stroke="#1c1917" stroke-width="1"/>

        <!-- degree ticks: 72 marks, every 5° major every 30° -->
        <g stroke="#1c1917">
          <line x1="350.0" y1="44.0" x2="350.0" y2="18.0" stroke-width="2"/>
          <line x1="377.7" y1="33.2" x2="378.9" y2="19.3" stroke-width="1"/>
          <line x1="405.2" y1="36.8" x2="407.7" y2="23.0" stroke-width="1"/>

          <line x1="503.0" y1="85.0" x2="516.0" y2="62.5" stroke-width="2"/>

          <line x1="593.6" y1="145.6" x2="604.3" y2="136.6" stroke-width="1"/>
          <line x1="610.5" y1="167.6" x2="622.0" y2="159.6" stroke-width="1"/>
          <line x1="615.0" y1="197.0" x2="637.5" y2="184.0" stroke-width="2"/>
          <line x1="638.2" y1="215.6" x2="650.9" y2="209.7" stroke-width="1"/>
          <line x1="648.8" y1="241.2" x2="662.0" y2="236.4" stroke-width="1"/>
          <line x1="657.2" y1="267.7" x2="670.7" y2="264.1" stroke-width="1"/>
          <line x1="663.2" y1="294.8" x2="677.0" y2="292.3" stroke-width="1"/>
          <line x1="666.8" y1="322.3" x2="680.7" y2="321.1" stroke-width="1"/>
          <line x1="656.0" y1="350.0" x2="682.0" y2="350.0" stroke-width="2"/>
          <line x1="666.8" y1="377.7" x2="680.7" y2="378.9" stroke-width="1"/>
          <line x1="663.2" y1="405.2" x2="677.0" y2="407.7" stroke-width="1"/>
          <line x1="657.2" y1="432.3" x2="670.7" y2="435.9" stroke-width="1"/>
          <line x1="648.8" y1="458.8" x2="662.0" y2="463.6" stroke-width="1"/>

          <line x1="615.0" y1="503.0" x2="637.5" y2="516.0" stroke-width="2"/>
          <line x1="610.5" y1="532.4" x2="622.0" y2="540.4" stroke-width="1"/>
          <line x1="593.6" y1="554.4" x2="604.3" y2="563.4" stroke-width="1"/>
          <line x1="574.9" y1="574.9" x2="584.8" y2="584.8" stroke-width="1"/>
          <line x1="554.4" y1="593.6" x2="563.4" y2="604.3" stroke-width="1"/>
          <line x1="532.4" y1="610.5" x2="540.4" y2="622.0" stroke-width="1"/>
          <line x1="503.0" y1="615.0" x2="516.0" y2="637.5" stroke-width="2"/>
          <line x1="484.4" y1="638.2" x2="490.3" y2="650.9" stroke-width="1"/>
          <line x1="458.8" y1="648.8" x2="463.6" y2="662.0" stroke-width="1"/>
          <line x1="432.3" y1="657.2" x2="435.9" y2="670.7" stroke-width="1"/>
          <line x1="405.2" y1="663.2" x2="407.7" y2="677.0" stroke-width="1"/>
          <line x1="377.7" y1="666.8" x2="378.9" y2="680.7" stroke-width="1"/>
          <line x1="350.0" y1="656.0" x2="350.0" y2="682.0" stroke-width="2"/>
          <line x1="322.3" y1="666.8" x2="321.1" y2="680.7" stroke-width="1"/>
          <line x1="294.8" y1="663.2" x2="292.3" y2="677.0" stroke-width="1"/>
          <line x1="267.7" y1="657.2" x2="264.1" y2="670.7" stroke-width="1"/>
          <line x1="241.2" y1="648.8" x2="236.4" y2="662.0" stroke-width="1"/>
          <line x1="215.6" y1="638.2" x2="209.7" y2="650.9" stroke-width="1"/>
          <line x1="197.0" y1="615.0" x2="184.0" y2="637.5" stroke-width="2"/>
          <line x1="167.6" y1="610.5" x2="159.6" y2="622.0" stroke-width="1"/>
          <line x1="145.6" y1="593.6" x2="136.6" y2="604.3" stroke-width="1"/>
          <line x1="125.1" y1="574.9" x2="115.2" y2="584.8" stroke-width="1"/>
          <line x1="106.4" y1="554.4" x2="95.7" y2="563.4" stroke-width="1"/>
          <line x1="89.5" y1="532.4" x2="78.0" y2="540.4" stroke-width="1"/>
          <line x1="85.0" y1="503.0" x2="62.5" y2="516.0" stroke-width="2"/>
          <line x1="61.8" y1="484.4" x2="49.1" y2="490.3" stroke-width="1"/>
          <line x1="51.2" y1="458.8" x2="38.0" y2="463.6" stroke-width="1"/>
          <line x1="42.8" y1="432.3" x2="29.3" y2="435.9" stroke-width="1"/>

          <line x1="33.2" y1="377.7" x2="19.3" y2="378.9" stroke-width="1"/>
          <line x1="44.0" y1="350.0" x2="18.0" y2="350.0" stroke-width="2"/>

          <line x1="36.8" y1="294.8" x2="23.0" y2="292.3" stroke-width="1"/>
          <line x1="42.8" y1="267.7" x2="29.3" y2="264.1" stroke-width="1"/>
          <line x1="51.2" y1="241.2" x2="38.0" y2="236.4" stroke-width="1"/>
          <line x1="61.8" y1="215.6" x2="49.1" y2="209.7" stroke-width="1"/>
          <line x1="85.0" y1="197.0" x2="62.5" y2="184.0" stroke-width="2"/>
          <line x1="89.5" y1="167.6" x2="78.0" y2="159.6" stroke-width="1"/>
          <line x1="106.4" y1="145.6" x2="95.7" y2="136.6" stroke-width="1"/>
          <line x1="125.1" y1="125.1" x2="115.2" y2="115.2" stroke-width="1"/>
          <line x1="145.6" y1="106.4" x2="136.6" y2="95.7" stroke-width="1"/>
          <line x1="167.6" y1="89.5" x2="159.6" y2="78.0" stroke-width="1"/>
          <line x1="197.0" y1="85.0" x2="184.0" y2="62.5" stroke-width="2"/>
          <line x1="215.6" y1="61.8" x2="209.7" y2="49.1" stroke-width="1"/>
          <line x1="241.2" y1="51.2" x2="236.4" y2="38.0" stroke-width="1"/>
          <line x1="267.7" y1="42.8" x2="264.1" y2="29.3" stroke-width="1"/>
          <line x1="294.8" y1="36.8" x2="292.3" y2="23.0" stroke-width="1"/>
          <line x1="322.3" y1="33.2" x2="321.1" y2="19.3" stroke-width="1"/>
        </g>
      </g>

      <!-- cardinal arms (thin spokes from hub) -->
      <g aria-hidden="true" stroke="#44403c" stroke-width="1.5">
        <line x1="350" y1="350" x2="350" y2="44"/>
        <line x1="350" y1="350" x2="656" y2="350"/>
        <line x1="350" y1="350" x2="350" y2="656"/>
        <line x1="350" y1="350" x2="44" y2="350"/>
      </g>

      <!-- cardinal markers (letter discs) -->
      <g aria-hidden="true">
        <!-- N -->
        <text x="350" y="28" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="17" font-weight="600" letter-spacing="1" fill="#1c1917">N</text>
        <!-- E -->
        <text x="672" y="356" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="17" font-weight="600" letter-spacing="1" fill="#1c1917">E</text>
        <!-- S -->
        <text x="350" y="684" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="17" font-weight="600" letter-spacing="1" fill="#1c1917">S</text>
        <!-- W -->
        <text x="28" y="356" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="17" font-weight="600" letter-spacing="1" fill="#1c1917">W</text>
      </g>

      <!-- THE NEEDLE — one magnetised needle pivoting on the centre, pointing off-centre between
           CLEAR and COMPLICATED (you are unsure which way). Red end = the single accent; dark end = counterweight.
           Both halves meet at the centre spindle so it reads as one needle. -->
      <g aria-hidden="true">
        <!-- dark counterweight half (rear) -->
        <polygon points="274.4,409.1 359.2,361.8 340.8,338.2" fill="#44403c"/>
        <!-- red pointing blade (forward, the one mark) -->
        <polygon points="511.5,223.8 359.2,361.8 340.8,338.2" fill="#C8102E"/>
      </g>

      <!-- hub: open ring around the pivot, red pivot dot on top of the needle joint -->
      <g>
        <circle cx="350" cy="350" r="62" fill="none" stroke="#1c1917" stroke-width="2"/>
        <circle cx="350" cy="350" r="6" fill="#C8102E"/>
      </g>
      <!-- DISORDER on its own solid chip just under the hub so nothing crosses it -->
      <g data-source="domain-disorder">
        <rect x="298" y="424" width="104" height="22" fill="#fafaf9"/>
        <text x="350" y="440" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" font-weight="600" letter-spacing="2" fill="#1c1917" data-critical="title">DISORDER</text>
      </g>

      <!-- DOMAIN LABELS at cardinals (protected reading) -->
      <!-- N = CLEAR -->
      <g data-source="domain-clear">
        <text x="350" y="86" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#1c1917" data-critical="title">CLEAR</text>
        <text x="350" y="108" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#78716c">sense · categorize · respond</text>
      </g>
      <!-- E = COMPLICATED -->
      <g data-source="domain-complicated">
        <text x="612" y="318" text-anchor="end" font-family="'IBM Plex Sans',sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#1c1917" data-critical="title">COMPLICATED</text>
        <text x="612" y="340" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#78716c">sense · analyze · respond</text>
      </g>
      <!-- S = CHAOTIC -->
      <g data-source="domain-chaotic">
        <text x="350" y="624" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#1c1917" data-critical="title">CHAOTIC</text>
        <text x="350" y="646" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#78716c">act · sense · respond</text>
      </g>
      <!-- W = COMPLEX -->
      <g data-source="domain-complex">
        <text x="88" y="318" text-anchor="start" font-family="'IBM Plex Sans',sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#1c1917" data-critical="title">COMPLEX</text>
        <text x="88" y="340" text-anchor="start" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#78716c">probe · sense · respond</text>
      </g>
    </svg>
  </div>

  <!-- TITLE + one body line -->
  <div class="legend">
    <div class="title" data-critical="title">A compass for<br>not knowing.</div>
    <div class="body" data-critical="body">Most tools hand you the answer. This one names the kind of question you're holding, and which way to start walking.</div>
  </div>

  <div class="colophon">
    <div data-source="origin">Snowden, 1999 · sense-making, not sorting</div>
    <div data-critical="cta"><b>Point first.</b> Then move.</div>
  </div>

</div>
</body>
</html>
